name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build Package
        run: |
          make ci -j16
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: webview-devtools-mcp-${{ github.sha }}
          path: packages/chrome-devtools-mcp/build/webview-devtools-mcp.tgz
